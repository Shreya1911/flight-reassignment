# GRPO Training Configuration
# ============================
# Phase 2: Group Relative Policy Optimization
# Reinforces SFT model against the live environment
#
# Usage:
#   python -m training.train_grpo --config training/configs/grpo_config.yaml

# Model (Qwen2.5 Instruct — response schema set manually in train_grpo.py)
model_name: "Qwen/Qwen2.5-7B-Instruct"
dataset_dir: "training/grpo_prompts"
output_dir: "/app/checkpoints/grpo"

# LoRA (smaller rank to reduce overfitting during RL)
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "down_proj"

# Training
num_train_epochs: 2
per_device_train_batch_size: 1
gradient_accumulation_steps: 16       # effective batch size = 16
learning_rate: 5.0e-6                 # standard GRPO from instruct model
warmup_steps: 20
bf16: true
gradient_checkpointing: true

# Logging
logging_steps: 1
save_strategy: "steps"
save_steps: 200
log_completions: false                # set true to debug what model generates

# GRPO algorithm
num_generations: 2                    # 4 completions per prompt for advantage estimation
max_completion_length: 12288          # full episode needs ~10K tokens (24 pax × ~365 tok/turn)
beta: 0.0                            # no KL penalty (clipping prevents collapse)
scale_rewards: true                   # normalize rewards within each group

# Reward weights
grader_reward_weight: 1.0             # primary signal: environment grader score
efficiency_reward_weight: 0.5         # secondary: step efficiency bonus

# Experiment tracking (trackio)
report_to: "trackio"
trackio_project: "flight-rebooking-grpo"
# trackio_run_name: "run-1"            # auto-generated if omitted

# vLLM acceleration (enable if vLLM is installed)
use_vllm: false
# vllm_mode: "colocate"
